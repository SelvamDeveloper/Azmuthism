<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard | Asmuthism</title>
  <link rel="icon" href="assets/logo-icon.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="dashboard-page portal-layout">
  <aside id="portal-sidebar" class="portal-sidebar"></aside>
  <div class="portal-main">
    <header class="site-header portal-header">
      <div class="header-inner">
        <button type="button" class="portal-mobile-menu" onclick="document.body.classList.toggle('portal-sidebar-open')">☰</button>
        <h2 class="portal-header-title" id="portal-header-title">Dashboard</h2>
        <div class="header-actions">
          <a href="checkout.html" class="icon-btn cart-link" aria-label="Cart">🛒 <span class="cart-count hidden">0</span></a>
          <span id="role-badge" class="role-badge hidden"></span>
          <button onclick="logout()" class="btn btn-outline btn-sm">Log Out</button>
        </div>
      </div>
    </header>
    <main class="portal-content">
      <div class="container">
        <div id="dashboard-root"></div>
      </div>
    </main>
  </div>

  <button class="scroll-top" aria-label="Scroll to top">↑</button>

  <script src="js/data.js"></script>
  <script src="js/course-store.js"></script>
  <script src="js/platform-settings.js"></script>
  <script src="js/demo.js"></script>
  <script src="js/app.js"></script>
  <script src="js/portal-sidebar.js"></script>
  <script src="js/live.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/animations.js"></script>
</body>
</html>
